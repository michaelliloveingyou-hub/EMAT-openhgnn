# rgcn_ohgbn_acm_ashinB.yaml
#
# 功能简介：
# RGCN 在 ohgbn-acm 数据集上启用 ASHIN-B 的实验配置摘要。
#
# 说明：
# 当前工程主要通过 main.py 命令行运行；这个 YAML 文件用于记录可复现实验配置。
# ASHIN-B 表示严格 node-signature incidence 特征，不做降维。
#
model: RGCN
dataset: ohgbn-acm
task: node_classification
use_ashin: true
ashin_version: B
ashin_norm: none
seed: 0
