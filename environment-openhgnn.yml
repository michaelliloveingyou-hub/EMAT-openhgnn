# 项目文件功能说明：
# 本文件定义 Lisan_project 内置 OpenHGNN 的 Conda 环境。
# 环境名为 lisan-openhgnn，使用 Python 3.10，并通过 pip 安装 OpenHGNN 所需的 PyTorch、DGL、OGB、Optuna 等依赖。
# 后续可用 conda env create -f environment-openhgnn.yml 创建环境，或用 setup_openhgnn_env.ps1 自动创建和安装。

name: lisan-openhgnn
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.2.1+cu121
      - torchdata==0.7.1
      - numpy<2
      - -f https://data.dgl.ai/wheels/repo.html
      - dgl==2.2.1+cu121
      - ogb>=1.3.1
      - optuna
      - pydantic
      - rdflib
      - colorama
      - igraph
      - tensorboard>=2.0.0
      - lmdb
      - ordered_set
      - scikit-learn
      - scipy
      - pandas
      - tqdm
